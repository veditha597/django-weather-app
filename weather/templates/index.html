<!DOCTYPE html>
<html>
<head>
<title>Weather App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(270deg,#4facfe,#00f2fe,#43e97b,#38f9d7);
background-size:800% 800%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:400px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 15px 35px rgba(0,0,0,0.25);
text-align:center;
color:white;
}

h1{
margin-bottom:25px;
font-weight:600;
letter-spacing:1px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:15px;
outline:none;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:white;
color:#333;
font-size:16px;
cursor:pointer;
transition:0.3s;
font-weight:600;
}

button:hover{
transform:scale(1.05);
background:#f1f1f1;
}

.weather{
margin-top:25px;
}

.icon{
font-size:50px;
margin-bottom:10px;
}

.city{
font-size:26px;
font-weight:600;
}

.temp{
font-size:50px;
font-weight:bold;
margin:10px 0;
}

.details{
font-size:17px;
line-height:1.8;
}

.error{
margin-top:15px;
background:rgba(255,0,0,0.25);
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🌤 Weather App</h1>

<form method="POST">
{% csrf_token %}

<input type="text" name="city" placeholder="Enter City Name">

<button type="submit">Check Weather</button>

</form>

{% if weather %}

<div class="weather">

<div class="icon">☀</div>

<div class="city">{{weather.city}}</div>

<div class="temp">{{weather.temperature}}°C</div>

<div class="details">
💧 Humidity: {{weather.humidity}} % <br>
🌬 Wind Speed: {{weather.wind}} m/s <br>
☁ {{weather.description}}
</div>

</div>

{% endif %}

{% if error %}

<div class="error">
{{error}}
</div>

{% endif %}

</div>

</body>
</html>
